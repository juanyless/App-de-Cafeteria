<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cocina - Monitor</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; padding: 20px; }
        .pedido-alerta { background: #f1c40f; color: #2c3e50; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 10px solid #d35400; }
        h1 { border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        button { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1em; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <h1>🔔 Monitor de Cocina - Pedidos Entrantes</h1>
    <div id="cola-pedidos"></div>
    <audio id="alarma" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCnaxLj7YdWuAV--PgAr4sqt3RdGEpd3HU",
            databaseURL: "https://cafeteria-saas-default-rtdb.firebaseio.com",
            projectId: "cafeteria-saas"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sonido = document.getElementById('alarma');

        // Sonido para pedidos nuevos
        db.ref('pedidos').on('child_added', (snapshot) => {
            if (snapshot.val().estado === "pendiente") {
                sonido.play().catch(e => console.log("Permiso de audio requerido"));
            }
        });

        // Dibujar pedidos en pantalla
// Dibujar pedidos en pantalla
db.ref('pedidos').on('value', (snapshot) => {
    const contenedor = document.getElementById('cola-pedidos');
    contenedor.innerHTML = ""; // Limpiamos pantalla
    
    if (!snapshot.exists()) {
        console.log("No hay pedidos en la base de datos");
        return;
    }

    snapshot.forEach((childSnapshot) => {
        const id = childSnapshot.key;
        const ped = childSnapshot.val();
        
        // Filtramos solo los que están pendientes
        if (ped.estado === "pendiente") {
            const div = document.createElement('div');
            div.className = "pedido-alerta";
            
            // IMPORTANTE: Verifica que ped.nombre y ped.monto coincidan con lo que envías
            div.innerHTML = `
                <h2>☕ ${ped.nombre || 'Producto'}</h2>
                <p><strong>Monto:</strong> $${ped.monto || 0}</p>
                <button onclick="completar('${id}')">MARCAR COMO LISTO</button>
            `;
            contenedor.appendChild(div);
        }
    });
});

// Esta función debe estar FUERA del listener para que sea global
function completar(idPedido) {
    db.ref(`pedidos/${idPedido}`).update({ 
        estado: "completado" 
    }).then(() => {
        console.log("Pedido finalizado");
    }).catch(e => alert("Error al marcar como listo"));
}
    </script>
</body>
</html>
